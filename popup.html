<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        width: 300px;
        font: 13px/1.4 system-ui, sans-serif;
      }
      header {
        padding: 10px 12px 8px;
        border-bottom: 1px solid color-mix(in srgb, currentColor 15%, transparent);
      }
      header h1 {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #search {
        box-sizing: border-box;
        width: 100%;
        padding: 6px 8px;
        border: 1px solid color-mix(in srgb, currentColor 25%, transparent);
        border-radius: 6px;
        font: inherit;
        background: transparent;
        color: inherit;
      }
      #apply {
        box-sizing: border-box;
        width: 100%;
        margin-bottom: 8px;
        padding: 7px 8px;
        border: none;
        border-radius: 6px;
        font: inherit;
        font-weight: 600;
        color: #fff;
        background: #e84e1c;
        cursor: pointer;
      }
      #apply:hover {
        background: #d04314;
      }
      #apply:active {
        background: #b93a10;
      }
      #apply:disabled {
        opacity: 0.7;
        cursor: default;
      }
      #search:focus {
        outline: 2px solid #e84e1c;
        outline-offset: -1px;
        border-color: transparent;
      }
      #tags {
        max-height: 360px;
        overflow-y: auto;
        padding: 6px 4px;
      }
      #tags label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 8px;
        border-radius: 6px;
        cursor: pointer;
      }
      #tags label:hover {
        background: color-mix(in srgb, currentColor 8%, transparent);
      }
      #tags input {
        accent-color: #e84e1c;
        margin: 0;
      }
      .tag-name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tag-count {
        opacity: 0.55;
        font-variant-numeric: tabular-nums;
      }
      #status {
        padding: 16px 12px;
        text-align: center;
        opacity: 0.7;
      }
      /* !important so it also beats the #tags label { display: flex } rule */
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <header class="hidden" id="header">
      <h1 id="deck-name">Moxfield Tagger</h1>
      <button id="apply">Apply Tags</button>
      <input id="search" type="search" placeholder="Search tags…" autofocus />
    </header>
    <div id="tags" class="hidden"></div>
    <div id="status">Loading…</div>
    <script src="popup.js"></script>
  </body>
</html>
